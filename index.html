<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS SCHOOL | مدرسة جافاسكربت المتكاملة</title>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #F7DF1E;
            --bg-dark: #1A1A1B;
            --bg-light: #F9F9F9;
            --text-dark: #FFFFFF;
            --card-bg: #252526;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="light"] {
            --bg-dark: #f0f2f5;
            --text-dark: #1a1a1a;
            --card-bg: #ffffff;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-dark);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            transition: var(--transition);
            overflow-x: hidden;
        }

        .navbar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1rem 5%; background: rgba(0,0,0,0.2);
            backdrop-filter: blur(15px); position: sticky; top: 0; z-index: 1000;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .logo { font-size: 1.5rem; font-weight: 900; }
        .logo span { color: var(--primary); }
        
        .points-badge {
            background: var(--primary); color: #000;
            padding: 6px 18px; border-radius: 50px; font-weight: 800;
            box-shadow: 0 4px 15px rgba(247, 223, 30, 0.3);
        }

        .hidden { display: none !important; }
        .btn-primary {
            background: var(--primary); color: #000; border: none;
            padding: 14px 30px; border-radius: 12px; cursor: pointer;
            font-weight: 700; transition: var(--transition);
            box-shadow: 0 4px 15px rgba(247, 223, 30, 0.2);
        }
        .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(247, 223, 30, 0.4); }

        .quiz-card {
            background: var(--card-bg); padding: 2.5rem; border-radius: 20px;
            max-width: 800px; margin: 30px auto;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .hero-section { text-align: center; padding: 120px 20px; }
        .welcome-msg { color: var(--primary); font-size: 2.5rem; font-weight: 900; margin-bottom: 10px; }

        .lessons-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; padding: 20px; }
        .lesson-btn {
            background: var(--card-bg); border: 1px solid #444; color: var(--text-dark);
            padding: 25px; border-radius: 15px; cursor: pointer; text-align: right;
            transition: var(--transition); position: relative; overflow: hidden;
        }
        .lesson-btn:hover { border-color: var(--primary); transform: scale(1.03); }
        
        code { background: #000; color: #4eff4e; padding: 15px; display: block; border-radius: 8px; font-family: 'Courier New', Courier, monospace; margin: 15px 0; direction: ltr; text-align: left; }
        .output-box { background: #333; color: #fff; padding: 10px 15px; border-left: 4px solid var(--primary); margin-bottom: 20px; font-size: 0.9rem; }

        .error-input { border: 2px solid #ff4d4d !important; animation: shake 0.4s; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        input[type="text"] {
            width: 100%; padding: 15px; background: #111; border: 1px solid #444;
            color: #fff; border-radius: 10px; margin: 10px 0; outline: none;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">JS <span>SCHOOL</span></div>
        <div class="nav-controls">
            <span class="points-badge"><i class="fas fa-star"></i> <span id="pts">0</span></span>
            <button id="themeToggle" style="background:none; border:none; color:white; font-size:1.2rem; cursor:pointer; margin-right:15px">🌙</button>
        </div>
    </nav>

    <main id="app-container">
        <section id="view-hero" class="hero-section" data-aos="fade-down">
            <h1>أهلاً بك في مستقبل البرمجة</h1>
            <p>منصة تعليمية ذكية تحلل مستواك وتأخذ بيدك للاحتراف.</p>
            <button onclick="startAssessment()" class="btn-primary">ابدأ اختبار تحديد المستوى</button>
        </section>

        <section id="view-assessment" class="hidden">
            <div class="quiz-card" data-aos="zoom-in">
                <div id="diff-tag" style="font-size: 0.7rem; color: var(--primary); letter-spacing: 2px; margin-bottom: 10px;">LEVEL 1</div>
                <h2 id="assess-q-text" style="margin-bottom:30px">السؤال...</h2>
                <div id="assess-options" class="lessons-grid" style="grid-template-columns: 1fr;"></div>
            </div>
        </section>

        <section id="view-welcome" class="hidden hero-section">
            <div data-aos="fade-up">
                <h1 class="welcome-msg">مرحباً بك أيها المبرمج الطموح! 🚀</h1>
                <p id="level-msg" style="font-size:1.2rem; margin-bottom:40px"></p>
                <div class="lessons-grid" style="max-width:800px; margin:auto">
                    <button class="btn-primary" onclick="navigateTo('lessons')"><i class="fas fa-book"></i> استكشاف المكتبة المعرفية</button>
                    <button class="btn-primary" onclick="startChallenges()"><i class="fas fa-code"></i> دخول مركز التحديات</button>
                </div>
            </div>
        </section>

        <section id="view-lessons" class="hidden">
            <div style="padding:40px 5%">
                <button onclick="navigateTo('welcome')" style="color:var(--primary); background:none; border:none; cursor:pointer; font-weight:bold; margin-bottom:20px">← العودة للرئيسية</button>
                <h1 style="margin-bottom:30px">المكتبة المعرفية 📚</h1>
                <div id="lessons-list" class="lessons-grid"></div>
            </div>
        </section>

        <section id="view-lesson-detail" class="hidden">
            <div class="quiz-card" style="max-width:900px">
                <button onclick="navigateTo('lessons')" style="color:var(--primary); background:none; border:none; cursor:pointer; font-weight:bold; margin-bottom:20px">← العودة للقائمة</button>
                <div id="lesson-content"></div>
            </div>
        </section>

        <section id="view-challenges" class="hidden">
            <div class="quiz-card" data-aos="zoom-in">
                <button onclick="navigateTo('welcome')" style="color:var(--primary); background:none; border:none; cursor:pointer; font-weight:bold; margin-bottom:10px">← العودة للرئيسية</button>
                <h2 id="ch-q-text" style="margin-bottom:20px">السؤال...</h2>
                <input type="text" id="ch-input" placeholder="اكتب الحل هنا...">
                <div style="display: flex; gap: 10px;">
                    <button class="btn-primary" onclick="checkChallenge()">إرسال الإجابة</button>
                    <button class="lesson-btn" style="padding: 14px 30px;" onclick="nextChallenge()">تخطي (Skip)</button>
                </div>
                <p id="ch-msg" style="margin-top:15px; font-weight:bold"></p>
            </div>
        </section>
    </main>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        // Data
        const assessmentQs = [
            { q: "ما هي الطريقة الصحيحة لتعريف ثابت في JS؟", opts: ["var", "let", "const"], correct: 2, level: "مبتدئ جداً" },
            { q: "كيف نكتب تعليقاً من سطر واحد؟", opts: ["# comment", "// comment", "/* comment */"], correct: 1, level: "مبتدئ" },
            { q: "ما هو ناتج 2 + '2'؟", opts: ["4", "22", "NaN"], correct: 1, level: "متوسط" },
            { q: "أي دالة تستخدم لتحويل نص إلى رقم صحيح؟", opts: ["toString()", "parseInt()", "Math.floor()"], correct: 1, level: "متقدم" },
            { q: "ما هي مخرجات typeof null؟", opts: ["null", "undefined", "object"], correct: 2, level: "محترف" }
        ];

        const challengesData = [
            { id: 1, q: "عرّف متغير ثابت باسم SITE قيمته 'Google'", ans: "const SITE = 'Google';" },
            { id: 2, q: "ما هو ناتج 5 + '5'؟", ans: "55" },
            { id: 3, q: "اكتب دالة باسم hi تعيد كلمة 'أهلاً'", ans: "function hi(){return 'أهلاً';}" }
            // يمكنك إضافة المزيد هنا..
        ];

        let points = 0, currentAssessIdx = 0, assessScore = 0, currentChIdx = 0;

        function navigateTo(viewId) {
            document.querySelectorAll('main > section').forEach(s => s.classList.add('hidden'));
            document.getElementById('view-' + viewId).classList.remove('hidden');
        }

        // Assessment Logic
        function startAssessment() { navigateTo('assessment'); renderAssessQ(); }
        function renderAssessQ() {
            const q = assessmentQs[currentAssessIdx];
            document.getElementById('diff-tag').innerText = `صعوبة السؤال: ${q.level}`;
            document.getElementById('assess-q-text').innerText = q.q;
            const container = document.getElementById('assess-options');
            container.innerHTML = '';
            q.opts.forEach((opt, i) => {
                const b = document.createElement('button');
                b.className = 'lesson-btn';
                b.innerText = opt;
                b.onclick = () => {
                    if(i === q.correct) assessScore++;
                    currentAssessIdx++;
                    if(currentAssessIdx < assessmentQs.length) renderAssessQ();
                    else showWelcome();
                };
                container.appendChild(b);
            });
        }

        // Challenge Logic
        function startChallenges() { navigateTo('challenges'); renderChallengeQ(); }
        function renderChallengeQ() {
            const ch = challengesData[currentChIdx];
            document.getElementById('ch-q-text').innerText = ch.q;
            document.getElementById('ch-input').value = "";
            document.getElementById('ch-msg').innerText = "";
        }

        function checkChallenge() {
            const input = document.getElementById('ch-input');
            const msg = document.getElementById('ch-msg');
            const ch = challengesData[currentChIdx];

            if(input.value.trim() === "") return;

            if(input.value.trim().replace(/\s/g, '') === ch.ans.replace(/\s/g, '')) {
                points += 20;
                document.getElementById('pts').innerText = points;
                msg.innerHTML = "✅ إجابة صحيحة! +20 نقطة";
                msg.style.color = "#4eff4e";
                setTimeout(nextChallenge, 1000);
            } else {
                input.classList.add('error-input');
                msg.innerHTML = "❌ خطأ، حاول مجدداً";
                msg.style.color = "#ff4d4d";
                setTimeout(() => input.classList.remove('error-input'), 500);
            }
        }

        function nextChallenge() {
            currentChIdx++;
            if(currentChIdx < challengesData.length) renderChallengeQ();
            else { alert("تم إنهاء جميع التحديات!"); navigateTo('welcome'); }
        }

        function showWelcome() {
            let levelLabel = assessScore >= 4 ? "محترف (Senior)" : (assessScore >= 2 ? "متوسط (Mid-Level)" : "مبتدئ (Junior)");
            document.getElementById('level-msg').innerText = `أحسنت! مسارك التعليمي هو: ${levelLabel}.`;
            navigateTo('welcome');
        }

        AOS.init();
        document.getElementById('themeToggle').onclick = () => {
            const theme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', theme);
        };
    </script>
</body>
</html>
