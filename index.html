<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS SCHOOL | التعلم الذكي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #121212; color: #e5e7eb; font-family: 'Cairo', sans-serif; }
        .js-card { background-color: #1e1e20; border: 1px solid #333; transition: 0.3s; }
        .js-card:hover { border-color: #F7DF1E; }
        .error-border { border-color: #ef4444 !important; }
    </style>
</head>
<body class="p-4 md:p-10">

    <nav class="flex justify-between items-center mb-10 border-b border-gray-800 pb-5">
        <div class="text-2xl font-black italic">JS <span class="text-[#F7DF1E]">SCHOOL</span></div>
        <div class="bg-gray-900 px-6 py-2 rounded-full border border-gray-800">
            النقاط: <span id="user-points" class="font-black text-[#F7DF1E]">0</span>
        </div>
    </nav>

    <main id="main-content" class="max-w-4xl mx-auto">
        <div id="view-dashboard" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <button onclick="showLibrary()" class="js-card p-10 rounded-3xl text-right hover:scale-105">
                <i class="fas fa-book-open text-4xl text-[#F7DF1E] mb-4"></i>
                <h3 class="text-2xl font-bold">المكتبة المعرفية</h3>
                <p class="text-gray-400">شروحات مفصلة لكل أساسيات اللغة.</p>
            </button>
            <button onclick="showChallenges()" class="js-card p-10 rounded-3xl text-right hover:scale-105">
                <i class="fas fa-vial text-4xl text-green-500 mb-4"></i>
                <h3 class="text-2xl font-bold">مركز الاختبارات</h3>
                <p class="text-gray-400">اختبر مهاراتك واحصل على نقاط.</p>
            </button>
        </div>

        <div id="dynamic-content" class="mt-10"></div>
    </main>

    <script>
        let points = 0;

        const lessons = [
            { id: 1, title: "المتغيرات", content: "تستخدم 'let' للمتغيرات القابلة للتغيير، و 'const' للقيم الثابتة التي لا تتغير. مثال: const PI = 3.14;" },
            { id: 2, title: "الدوال", content: "الدالة هي كتلة برمجية. تعريفها: function myFunc() { // كود هنا }." },
            { id: 3, title: "المصفوفات", content: "المصفوفة هي قائمة قيم: const arr = [1, 2, 3];. تبدأ دائماً بالفهرس 0." },
            { id: 4, title: "الكائنات", content: "الكائن يربط مفاتيح بقيم: const user = {name: 'Ali'};." }
        ];

        const challenges = [
            { id: 1, title: "تحدي المتغيرات", question: "عرّف متغير ثابت باسم PI يساوي 3.14", answer: "const PI = 3.14;" },
            { id: 2, title: "تحدي الطباعة", question: "ما هو الأمر لطباعة 'Hello' في الـ Console؟", answer: "console.log('Hello');" }
        ];

        function showLibrary() {
            document.getElementById('view-dashboard').classList.add('hidden');
            document.getElementById('dynamic-content').innerHTML = `
                <button onclick="goBack()" class="mb-6 text-gray-400"><i class="fas fa-arrow-right"></i> عودة</button>
                <div class="grid gap-4">
                    ${lessons.map(l => `<div class="js-card p-6 rounded-2xl cursor-pointer" onclick="viewLesson(${l.id})">${l.title}</div>`).join('')}
                </div>`;
        }

        function viewLesson(id) {
            const lesson = lessons.find(l => l.id === id);
            document.getElementById('dynamic-content').innerHTML = `
                <button onclick="showLibrary()" class="mb-6 text-gray-400"><i class="fas fa-arrow-left"></i> قائمة الدروس</button>
                <div class="js-card p-10 rounded-3xl border-r-8 border-[#F7DF1E]">
                    <h2 class="text-3xl font-black mb-6">${lesson.title}</h2>
                    <p class="text-lg text-gray-300 leading-loose">${lesson.content}</p>
                </div>`;
        }

        function showChallenges() {
            document.getElementById('view-dashboard').classList.add('hidden');
            document.getElementById('dynamic-content').innerHTML = `
                <button onclick="goBack()" class="mb-6 text-gray-400"><i class="fas fa-arrow-right"></i> عودة</button>
                ${challenges.map(c => `
                    <div class="js-card p-8 rounded-3xl mb-6">
                        <p class="mb-4 text-xl">${c.question}</p>
                        <input type="text" id="ans-${c.id}" class="w-full bg-black border border-gray-700 p-4 rounded-xl mb-4" placeholder="اكتب الحل هنا...">
                        <button onclick="checkResult(${c.id}, '${c.answer}')" class="w-full py-4 bg-green-600 rounded-xl font-bold">إرسال الإجابة</button>
                    </div>
                `).join('')}`;
        }

        function checkResult(id, correctAnswer) {
            const input = document.getElementById(`ans-${id}`);
            if (input.value.trim() === "") {
                input.classList.add('error-border');
                return;
            }
            
            if (input.value.trim() === correctAnswer) {
                input.classList.remove('error-border');
                input.disabled = true;
                input.className = "w-full bg-green-900/20 border border-green-500 p-4 rounded-xl mb-4";
                points += 20;
                document.getElementById('user-points').innerText = points;
                alert("إجابة صحيحة! +20 نقطة");
            } else {
                alert("إجابة خاطئة، حاول مجدداً!");
            }
        }

        function goBack() {
            document.getElementById('view-dashboard').classList.remove('hidden');
            document.getElementById('dynamic-content').innerHTML = "";
        }
    </script>
</body>
</html>
