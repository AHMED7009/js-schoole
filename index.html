<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS SCHOOL | التعلم الذكي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0f0f10; color: white; font-family: 'Cairo', sans-serif; }
        .js-card { background-color: #1e1e20; border: 1px solid rgba(247, 223, 30, 0.1); }
        .error-border { border-color: #ef4444 !important; background-color: rgba(239, 68, 68, 0.05); }
    </style>
</head>
<body class="pb-20">

    <nav class="fixed top-0 w-full z-50 bg-[#1e1e20]/90 backdrop-blur-md px-6 py-4 flex justify-between items-center border-b border-white/5">
        <div class="text-2xl font-black">JS <span class="text-[#F7DF1E]">SCHOOL</span></div>
        <div class="bg-black/40 px-4 py-1.5 rounded-full border border-white/10">
            النقاط: <span id="user-points" class="font-bold text-[#F7DF1E]">0</span>
        </div>
    </nav>

    <main class="mt-28 px-4 max-w-5xl mx-auto">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-12">
            <button onclick="showLibrary()" class="js-card p-10 rounded-3xl text-right hover:border-[#F7DF1E] transition-all">
                <i class="fas fa-book-open text-4xl text-[#F7DF1E] mb-4"></i>
                <h3 class="text-2xl font-bold">المكتبة المعرفية</h3>
                <p class="text-gray-400">شروحات مفصلة حول اللغة.</p>
            </button>
            <button onclick="showChallenges()" class="js-card p-10 rounded-3xl text-right hover:border-green-500 transition-all">
                <i class="fas fa-vial text-4xl text-green-500 mb-4"></i>
                <h3 class="text-2xl font-bold">مركز التحديات</h3>
                <p class="text-gray-400">اختبر معلوماتك واكسب نقاط.</p>
            </button>
        </div>

        <div id="content-area">
            </div>
    </main>

    <script>
        let points = 0;

        const lessons = [
            { id: 1, title: "المتغيرات (Variables)", content: "المتغيرات هي حاويات لتخزين المعلومات. نستخدم 'let' للقيم المتغيرة و 'const' للقيم الثابتة. مثال: const x = 10;." },
            { id: 2, title: "الدوال (Functions)", content: "الدالة هي مجموعة تعليمات برمجية. نستخدمها لتنفيذ مهام متكررة. تعريف الدالة يبدأ بكلمة 'function' ثم اسم الدالة." }
        ];

        const challenges = [
            { id: 1, title: "تحدي المتغير الثابت", question: "عرّف متغير ثابت باسم PI يساوي 3.14." },
            { id: 2, title: "تحدي الطباعة", question: "ما هو الأمر لطباعة جملة في وحدة التحكم (Console)؟" }
        ];

        // عرض المكتبة
        function showLibrary() {
            const area = document.getElementById('content-area');
            area.innerHTML = `<h2 class="text-3xl font-bold mb-6">قائمة الدروس</h2>` + 
                lessons.map(l => `<div class="js-card p-6 mb-4 rounded-xl cursor-pointer hover:bg-white/5" onclick="viewLesson(${l.id})">${l.title}</div>`).join('');
        }

        // عرض تفاصيل الدرس
        function viewLesson(id) {
            const lesson = lessons.find(l => l.id === id);
            document.getElementById('content-area').innerHTML = `
                <button onclick="showLibrary()" class="mb-4 text-gray-400"><i class="fas fa-arrow-right"></i> عودة</button>
                <div class="js-card p-10 rounded-3xl">
                    <h2 class="text-4xl font-bold text-[#F7DF1E] mb-6">${lesson.title}</h2>
                    <p class="text-lg leading-loose">${lesson.content}</p>
                </div>
            `;
        }

        // عرض التحديات
        function showChallenges() {
            const area = document.getElementById('content-area');
            area.innerHTML = `<h2 class="text-3xl font-bold mb-6">مركز التحديات</h2>` +
                challenges.map(c => `
                    <div class="js-card p-6 mb-6 rounded-2xl">
                        <p class="mb-4">${c.question}</p>
                        <input type="text" id="ans-${c.id}" class="w-full bg-black/30 border border-white/10 p-4 rounded-xl mb-3 outline-none" placeholder="اكتب الإجابة هنا...">
                        <button onclick="submitAnswer(${c.id})" class="w-full py-3 bg-green-600 rounded-xl font-bold">إرسال الإجابة</button>
                    </div>
                `).join('');
        }

        // التحقق من الإجابة
        function submitAnswer(id) {
            const input = document.getElementById(`ans-${id}`);
            if (input.value.trim() === "") {
                input.classList.add('error-border');
                return;
            }
            input.classList.remove('error-border');
            input.disabled = true;
            points += 20;
            document.getElementById('user-points').innerText = points;
            alert("إجابة صحيحة! +20 نقطة");
        }
    </script>
</body>
</html>
